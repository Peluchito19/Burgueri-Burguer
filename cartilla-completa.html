<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Buruberi Burger | Cartilla completa</title>
  <meta name="description" content="Version alternativa de la cartilla digital con afiche completo y carrito flotante.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles-cartilla-completa.css">
</head>
<body>
  <main class="poster-view">
    <section class="poster-frame fade-in" aria-labelledby="poster-view-title">
      <h1 class="sr-only" id="poster-view-title">Cartilla Buruberi Burger con carrito compacto</h1>
      <img
        class="poster-image"
        src="public/images/18ab15c9-0f0d-48ad-a463-ac39b9246702.jpg"
        alt="Cartilla Buruberi Burger con hamburguesas, papas fritas, combo familiar, horario y WhatsApp"
      >
      <div class="poster-hotspots" id="menu-hotspots" aria-label="Productos interactivos del afiche"></div>

      <div class="cart-overlay">
        <button
          class="cart-trigger"
          id="cart-toggle"
          type="button"
          aria-controls="pedido"
          aria-expanded="false"
          aria-label="Abrir carrito"
        >
          <span class="cart-trigger__icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" role="presentation" focusable="false">
              <path d="M7 18C5.9 18 5.01 18.9 5.01 20S5.9 22 7 22 9 21.1 9 20 8.1 18 7 18ZM1 2V4H3L6.6 11.59 5.25 14.04C5.09 14.32 5 14.65 5 15A2 2 0 0 0 7 17H19V15H7.42A.25.25 0 0 1 7.2 14.63L8.1 13H15.55C16.3 13 16.96 12.59 17.3 11.97L20.88 5.48A1 1 0 0 0 20 4H5.21L4.27 2H1ZM17 18C15.9 18 15.01 18.9 15.01 20S15.9 22 17 22 19 21.1 19 20 18.1 18 17 18Z"></path>
            </svg>
          </span>
          <span class="cart-trigger__label">Carrito</span>
          <span class="cart-trigger__count" id="floating-count">0</span>
        </button>

        <aside class="cart-popover is-collapsed" id="pedido" aria-label="Detalle del carrito">
          <div class="cart-popover__header">
            <h2>Pedido</h2>
            <button class="cart-close" id="cart-close" type="button" aria-label="Cerrar carrito">Cerrar</button>
          </div>

          <p class="cart-status" id="cart-status" aria-live="polite">Aun no agregas productos.</p>

          <div class="cart-items" id="cart-items"></div>

          <div class="cart-summary">
            <div class="summary-row">
              <span>Items</span>
              <strong id="cart-count">0</strong>
            </div>

            <div class="summary-row total-row">
              <span>Total</span>
              <strong id="cart-total" aria-live="polite">$0</strong>
            </div>
          </div>

          <div class="cart-actions">
            <button class="ghost-button" id="clear-cart" type="button">Vaciar</button>
            <a class="whatsapp-button is-disabled" id="whatsapp-link" href="#" target="_blank" rel="noreferrer">
              WhatsApp
            </a>
          </div>
        </aside>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
  <script src="poster-layout.js"></script>
</body>
</html>
